services:
  postgres:
    image: postgres:15
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-customer_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mock-server:
    build: ./mock-server
    ports:
      - "${MOCK_SERVER_PORT:-5000}:${MOCK_SERVER_PORT:-5000}"
    depends_on:
      - postgres
    environment:
      MOCK_SERVER_HOST: ${MOCK_SERVER_HOST:-0.0.0.0}
      MOCK_SERVER_PORT: ${MOCK_SERVER_PORT:-5000}

  pipeline-service:
    build: ./pipeline-service
    ports:
      - "${PIPELINE_SERVICE_PORT:-8000}:${APP_PORT:-8000}"
    depends_on:
      - postgres
      - mock-server
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-customer_db}
      MOCK_SERVER_URL: http://mock-server:${MOCK_SERVER_PORT:-5000}
      INGEST_PAGE_SIZE: ${INGEST_PAGE_SIZE:-10}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}

volumes:
  postgres_data:
